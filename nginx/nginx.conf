server {
    listen 80;
    server_name _;

    # Serve static files from the mounted volume
    location /static/ {
        alias /static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Browsers and iOS devices probe these at the site root regardless of <link>
    # tags; map them to the collected static icons so they don't 404 through to
    # Django (which logged "Not Found: /favicon.ico" etc. on every page load).
    location = /favicon.ico {
        alias /static/inventory/images/favicon.ico;
        access_log off;
        expires 30d;
    }
    location = /apple-touch-icon.png {
        alias /static/inventory/images/apple-touch-icon.png;
        access_log off;
        expires 30d;
    }
    location = /apple-touch-icon-precomposed.png {
        alias /static/inventory/images/apple-touch-icon-precomposed.png;
        access_log off;
        expires 30d;
    }

    # Inventory stats JSON for Home Assistant — written by ha_stats_export.py cron
    location /ha-stats/ {
        alias /ha-stats/;
        add_header Content-Type application/json;
        add_header Cache-Control "no-cache";
        access_log off;
    }

    # Proxy everything else to Gunicorn (running in Django container)
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Optional timeouts (good for Gunicorn)
        proxy_connect_timeout 10;
        proxy_read_timeout 60;
    }
}
