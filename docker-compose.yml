services:
  web:
    build: .
    command: ["/app/entrypoint.sh"]
    restart: unless-stopped
    volumes:
      # DB *directory* (not the single file) so WAL's -wal/-shm siblings are
      # shareable across containers (Phase 16.1). SQLITE_DB_PATH in ~/.env_inventory
      # points at /app/db/inventory_db.sqlite3.
      - ${HOME}/inventory_db_dir:/app/db
      - static_volume:/app/staticfiles
    expose:
      - "8000"
    environment:
      - DEBUG=0
    env_file:
      - ${HOME}/.env_inventory

  nginx:
    image: nginx:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - static_volume:/static  # ✅ Match nginx.conf alias!
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ${HOME}/ha-stats:/ha-stats:ro  # JSON stats consumed by Home Assistant
    depends_on:
      - web

volumes:
  static_volume:
