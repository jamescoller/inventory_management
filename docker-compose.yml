services:
  web:
    build: .
    command: ["/app/entrypoint.sh"]
    restart: always
    volumes:
      - ${HOME}/inventory_db.sqlite3:/app/inventory_db.sqlite3
      - static_volume:/app/staticfiles
    expose:
      - "8000"
    environment:
      - DEBUG=0
    env_file:
      - ${HOME}/.env_inventory

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - static_volume:/static  # ✅ Match nginx.conf alias!
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web

volumes:
  static_volume:
