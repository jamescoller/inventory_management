services:
  web:
    build: .
    command: ["/app/entrypoint.sh"]
    restart: unless-stopped
    volumes:
      # DB *directory* (not the single file) so WAL's -wal/-shm siblings are
      # shareable across containers (Phase 16.1).
      - ${HOME}/inventory_db_dir:/app/db
      - static_volume:/app/staticfiles
    expose:
      - "8000"
    environment:
      - DEBUG=0
      # DB lives in the bind-mounted directory above (Phase 16.1). Set here rather
      # than ~/.env_inventory because that file is root-owned (jcoller can't append)
      # and this is a non-secret path, so it belongs in version control anyway.
      - SQLITE_DB_PATH=/app/db/inventory_db.sqlite3
    env_file:
      - ${HOME}/.env_inventory

  telemetry:
    # Bambu MQTT telemetry consumer (Phase 16.1 PR-B). Same image as web; runs
    # the consumer instead of entrypoint.sh. Read-only mirror — does NOT run
    # migrations (web's entrypoint owns that; the consumer retries until the
    # schema exists). Shares the DB directory so it sees web's WAL.
    # NOTE: the Dockerfile sets ENTRYPOINT=entrypoint.sh, so a compose `command:`
    # is only *args* to it (ignored → it'd run gunicorn). Override `entrypoint:`.
    build: .
    entrypoint: ["python", "manage.py", "run_telemetry_consumer"]
    restart: unless-stopped
    volumes:
      - ${HOME}/inventory_db_dir:/app/db
    environment:
      - DEBUG=0
      - SQLITE_DB_PATH=/app/db/inventory_db.sqlite3
    env_file:
      - ${HOME}/.env_inventory
    depends_on:
      - web

  nginx:
    image: nginx:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - static_volume:/static  # ✅ Match nginx.conf alias!
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ${HOME}/ha-stats:/ha-stats:ro  # JSON stats consumed by Home Assistant
    depends_on:
      - web

volumes:
  static_volume:
