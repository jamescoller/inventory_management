{% extends "inventory/base.html" %}
{% block content %}
<div class="container py-4">
  <h2>{{ form_title }}</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">{{ submit_label }}</button>
    {% if request.GET.from_inventory %}
      <a href="{% url 'add_inventory' %}" class="btn btn-secondary">Cancel</a>
    {% else %}
      <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
    {% endif %}
  </form>
</div>
{% endblock content %}
