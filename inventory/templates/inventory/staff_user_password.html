{% extends "inventory/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
	<div class="row">
		<div class="col-11 col-md-4 mx-auto mt-5">
			<h1>Reset Password</h1>
			<p class="text-muted">Setting a new password for <strong>{{ target_user.username }}</strong>.</p>
			<form method="post">
				{% csrf_token %}
				{{ form|crispy }}
				<button class="btn btn-primary" type="submit">Set Password</button>
				<a href="{% url 'staff_user_list' %}" class="btn btn-link">Cancel</a>
			</form>
		</div>
	</div>
{% endblock content %}
