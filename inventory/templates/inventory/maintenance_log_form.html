{% extends "inventory/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container py-4">
    <h2>Log maintenance — {{ product }}</h2>
    <p class="text-muted">Recording against unit INV-{{ item.id }}{% if item.serial_number %} (serial {{ item.serial_number }}){% endif %}.</p>

    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'unit_maintenance' item.id %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock content %}
