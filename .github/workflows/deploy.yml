name: Deploy to inventory-manager LXC

on:
  push:
    branches:
      - master
      - release/*
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run deployment script
        run: bash scripts/deploy.sh
