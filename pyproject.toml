[tool.ruff]
target-version = "py312"
line-length = 88
extend-exclude = ["*/migrations/*", "staticfiles", "static"]

[tool.ruff.lint]
# Conservative starter set; expand later.
# E,W = pycodestyle  F = pyflakes (unused/undefined)  I = isort  UP = pyupgrade  B = bugbear  DJ = django
select = ["E", "W", "F", "I", "UP", "B", "DJ"]
ignore = [
    "E501",   # line length — black/formatter handles this
    "B008",   # function call in default arg — common in Django (e.g. timezone.now)
]

[tool.ruff.lint.per-file-ignores]
"**/settings.py" = ["F405", "F403"]  # star imports tolerated in settings if any

[tool.djlint]
profile = "django"
indent = 2
max_line_length = 120
# Rules deliberately disabled for this project (a LAN-only household app):
#   H021 - inline styles are acceptable for one-off styled elements here
#   H023 - HTML entities (&mdash; etc.) are fine
#   H030/H031 - meta description/keywords are pointless for a non-public app
ignore = "H021,H023,H030,H031"
